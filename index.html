let selectedQuestionCount = 15;

function shuffle(array){
  return array.map(v=>({v,r:Math.random()})).sort((a,b)=>a.r-b.r).map(o=>o.v);
}

function selectQuestionCount(count){
  selectedQuestionCount = count;
  document.getElementById("mode15").classList.toggle("selected", count === 15);
  document.getElementById("mode30").classList.toggle("selected", count === 30);
  document.getElementById("mode50").classList.toggle("selected", count === 50);
}

function startGame(){
  const shuffled = shuffle([...questions]);

  deck = shuffled.slice(0, Math.min(selectedQuestionCount, shuffled.length));

  currentIndex = 0;
  life = MAX_LIFE;
  input = "";
  shieldActive = false;
  usedOddEven = false;
  usedRange = false;
  usedShield = false;
  activeHints = [];
  answerHistory = [];

  document.getElementById("titleScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  document.getElementById("gameInfo").textContent = `${deck.length} QUESTIONS`;

  updateItems();
  showQuestion();
  updateLife();
}

function backToTitle(){
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("titleScreen").classList.remove("hidden");
}

  activeHints = [];

  document.getElementById("questionNo").textContent = `QUESTION ${currentIndex + 1} / ${deck.length}`;
  document.getElementById("questionText").textContent = deck[currentIndex].q;
  document.getElementById("hintText").innerHTML = "";
  document.getElementById("answerDisplay").textContent = "0";
  document.getElementById("message").textContent = "";
  document.getElementById("message").className = "message";
}

function pressNumber(num){
  if(input.length >= 2) return;
  input = input === "0" ? num : input + num;

  if(Number(input) > MAX_ANSWER){
    input = String(MAX_ANSWER);
  }

  document.getElementById("answerDisplay").textContent = input;
}

function clearAnswer(){
  input = "";
  document.getElementById("answerDisplay").textContent = "0";
}

function submitAnswer(){
  if(input === "") input = "0";

  const currentQuestion = deck[currentIndex];
  const answer = currentQuestion.a;
  const player = Number(input);

  if(player < MIN_ANSWER || player > MAX_ANSWER){
    showMessage("0〜50で入力してください", "wrong");
    return;
  }

  if(player === answer){
    let heal = 0;
    if(shieldActive){
      heal = 5;
      life = Math.min(MAX_LIFE, life + heal);
      showMessage("正解！ GUARDでLIFE +5", "correct");
    }else{
      showMessage("正解！", "correct");
    }

    answerHistory.push({
      q: currentQuestion.q,
      player,
      answer,
      correct: true,
      damage: 0,
      heal
    });

    updateLife();
    correctEffect();

    setTimeout(() => {
      currentIndex++;
      showQuestion();
    }, 850);
  }else{
    let damage = Math.abs(player - answer);
    const originalDamage = damage;

    if(shieldActive){
      damage = Math.ceil(damage / 4);
    }

    life -= damage;
    if(life < 0) life = 0;

    answerHistory.push({
      q: currentQuestion.q,
      player,
      answer,
      correct: false,
      damage,
      originalDamage,
      guarded: shieldActive
    });

    updateLife();
    shakeScreen(damage);

    showMessage(`不正解！ 正解は${answer}。${damage}ダメージ`, "wrong");

    setTimeout(() => {
      if(life <= 0){
        endGame(false);
      }else{
        currentIndex++;
        showQuestion();
      }
    }, 1250);
  }
}

function useOddEven(){
  if(usedOddEven) return;
  const answer = deck[currentIndex].a;
  const text = answer % 2 === 0 ? "偶数" : "奇数";
  activeHints.push(`ODD/EVEN：答えは${text}`);
  renderHints();
  usedOddEven = true;
  updateItems();
}

function useRange(){
  if(usedRange) return;
  const answer = deck[currentIndex].a;
  const width = RANGE_HINT_WIDTH;
  const minStart = Math.max(MIN_ANSWER, answer - width + 1);
  const maxStart = Math.min(answer, MAX_ANSWER - width + 1);
  const start = randomInt(minStart, maxStart);
  const end = start + width - 1;
  activeHints.push(`RANGE：答えは${start}〜${end}のどこか`);
  renderHints();
  usedRange = true;
  updateItems();
}

function useShield(){
  if(usedShield) return;
  shieldActive = true;
  usedShield = true;
  activeHints.push("GUARD：誤答ダメージ1/4,正解ならLIFE+5");
  renderHints();
  updateItems();
}

function correctEffect(){
  const gameScreen = document.getElementById("gameScreen");
  gameScreen.classList.remove("correctFlash");
  void gameScreen.offsetWidth;
  gameScreen.classList.add("correctFlash");
  setTimeout(()=>gameScreen.classList.remove("correctFlash"),450);
}

function shakeScreen(damage){
  const gameScreen = document.getElementById("gameScreen");
  const power = Math.min(18, 4 + damage);
  gameScreen.style.setProperty("--shake-power", `${power}px`);
  gameScreen.classList.remove("shake");
  void gameScreen.offsetWidth;
  gameScreen.classList.add("shake");
  setTimeout(()=>gameScreen.classList.remove("shake"),350);
}

function randomInt(min,max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function renderHints(){
  document.getElementById("hintText").innerHTML =
    activeHints.map(h => `・${h}`).join("<br>");
}

function updateItems(){
  document.getElementById("itemOddEven").classList.toggle("used", usedOddEven);
  document.getElementById("itemRange").classList.toggle("used", usedRange);
  document.getElementById("itemShield").classList.toggle("used", usedShield);
}

function updateLife(){
  const lifeValue = document.getElementById("lifeValue");
  const lifeBar = document.getElementById("lifeBar");
  const rate = life / MAX_LIFE;

  lifeValue.textContent = `${life} / ${MAX_LIFE}`;
  lifeBar.style.width = `${rate * 100}%`;

  if(rate > .65) lifeBar.style.background = "#00ff66";
  else if(rate > .4) lifeBar.style.background = "#ffff33";
  else if(rate > .2) lifeBar.style.background = "#ff9900";
  else lifeBar.style.background = "#ff2244";
}

function showMessage(text,type){
  const msg = document.getElementById("message");
  msg.textContent = text;
  msg.className = `message ${type}`;
}

function endGame(clear){
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");

  const correctCount = answerHistory.filter(r => r.correct).length;

  if(clear){
    document.getElementById("resultTitle").textContent = "COMPLETE!";
    document.getElementById("resultText").innerHTML =
      `${deck.length}問チャレンジ突破！<br>正解数：${correctCount} / ${answerHistory.length}<br>残りLIFE：${life}`;
  }else{
    document.getElementById("resultTitle").textContent = "CHALLENGE ENDED";
    document.getElementById("resultText").innerHTML =
      `${currentIndex + 1}問目で終了<br>正解数：${correctCount} / ${answerHistory.length}`;
  }

  renderReview();
}

function renderReview(){
  const reviewList = document.getElementById("reviewList");
  reviewList.innerHTML = "";

  if(answerHistory.length === 0){
    reviewList.innerHTML = `<div class="reviewItem">振り返る問題がありません。</div>`;
    return;
  }

  answerHistory.forEach((r, index) => {
    const item = document.createElement("div");
    item.className = `reviewItem ${r.correct ? "okReview" : "ngReview"}`;

    const resultText = r.correct
      ? `<span class="reviewCorrect">正解</span>`
      : `<span class="reviewWrong">不正解 / ${r.damage}ダメージ${r.guarded ? `（GUARD前 ${r.originalDamage}）` : ""}</span>`;

    const healText = r.heal ? ` / LIFE +${r.heal}` : "";

    item.innerHTML = `
      <div class="reviewHead">Q${index + 1} ${resultText}${healText}</div>
      <div>${escapeHtml(r.q)}</div>
      <div class="reviewMeta">あなたの回答：${r.player}　正解：${r.answer}</div>
    `;

    reviewList.appendChild(item);
  });
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("mode15").addEventListener("click", () => selectQuestionCount(15));
  document.getElementById("mode30").addEventListener("click", () => selectQuestionCount(30));
  document.getElementById("mode50").addEventListener("click", () => selectQuestionCount(50));

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("backTitleBtn").addEventListener("click", backToTitle);

  document.getElementById("itemOddEven").addEventListener("click", useOddEven);
  document.getElementById("itemRange").addEventListener("click", useRange);
  document.getElementById("itemShield").addEventListener("click", useShield);

  document.querySelectorAll("[data-num]").forEach(btn => {
    btn.addEventListener("click", () => pressNumber(btn.dataset.num));
  });

  document.getElementById("clearBtn").addEventListener("click", clearAnswer);
  document.getElementById("okBtn").addEventListener("click", submitAnswer);
});
</script>

</body>
</html>
